name: Frontend Data Freshness

on:
  pull_request:
    paths:
      - "frontend/**"
      - "data/iceland-ai-governance-audit/data/raw/**"
      - ".github/workflows/frontend-data-freshness.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "frontend/**"
      - "data/iceland-ai-governance-audit/data/raw/**"
      - ".github/workflows/frontend-data-freshness.yml"

jobs:
  freshness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate data payloads
        run: npm run build:data
      - name: Verify wiring freshness
        run: npm run check:data:freshness
